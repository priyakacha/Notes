name: CI + CD

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: npm install

      - run: echo "CI passed ✅"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy message
        run: echo "Deploying app 🚀"
